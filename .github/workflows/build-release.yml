name: Build & Release Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "FastLED"

      - name: Build sketch
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            cross/

      - name: Rename binary
        run: |
          # arduino-cli outputs cross.ino.bin — rename to cross.bin for OTA
          mv build/cross.ino.bin build/cross.bin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CROSS Firmware ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## CROSS Firmware ${{ steps.version.outputs.VERSION }}

            ### Flash via esptool
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 write_flash 0x10000 cross.bin
            ```

            ### Flash via Arduino IDE
            Use **Sketch → Upload Using Programmer** with the `.bin` file.

            ### OTA
            Deployed devices running v4.0+ will auto-update within 24h.
          files: build/cross.bin
          draft: false
          prerelease: false
