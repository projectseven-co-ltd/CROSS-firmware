name: Build & Release Firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.1.3

      - name: Install libraries
        run: |
          arduino-cli lib install "ArduinoJson@7.3.1"
          arduino-cli lib install "FastLED@3.9.13"

      - name: Build sketch
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            cross/

      - name: Rename binary
        run: |
          # arduino-cli outputs cross.ino.bin — rename to cross.bin for OTA compatibility
          mv build/cross.ino.bin build/cross.bin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CROSS Firmware ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## CROSS Firmware ${{ steps.version.outputs.VERSION }}

            ### Flash
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 write_flash 0x10000 cross.bin
            ```

            ### OTA
            Deployed devices will auto-update within 24h.

            ### Changelog
            See commit history for changes in this release.
          files: build/cross.bin
          draft: false
          prerelease: false
